spring.application.name=Product_Test
server.port=${SERVER_PORT:8081}
app.instance-id=${INSTANCE_ID:instance-${server.port}}

app.datasource.write.url=${DB_WRITE_URL:${DB_URL:jdbc:mysql://localhost:3306/seckill_demo?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}}
app.datasource.write.username=${DB_WRITE_USERNAME:${DB_USERNAME:root}}
app.datasource.write.password=${DB_WRITE_PASSWORD:${DB_PASSWORD:cao102211}}
app.datasource.write.driver-class-name=com.mysql.cj.jdbc.Driver

app.datasource.read.url=${DB_READ_URL:${DB_URL:${app.datasource.write.url}}}
app.datasource.read.username=${DB_READ_USERNAME:${DB_USERNAME:${app.datasource.write.username}}}
app.datasource.read.password=${DB_READ_PASSWORD:${DB_PASSWORD:${app.datasource.write.password}}}

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.timeout=2s

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=${KAFKA_GROUP_ID:seckill-order-group}
spring.kafka.consumer.auto-offset-reset=latest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

app.kafka.topic.seckill-order=${SECKILL_TOPIC:seckill-order-topic}
app.kafka.topic.order-pay=${ORDER_PAY_TOPIC:order-pay-topic}
app.kafka.topic.order-cancel=${ORDER_CANCEL_TOPIC:order-cancel-topic}

mybatis.configuration.map-underscore-to-camel-case=true
