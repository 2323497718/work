{
  "dataId": "product-test-service.yaml",
  "group": "DEFAULT_GROUP",
  "content": "# Product Test Service Configuration for Nacos\n# This configuration can be dynamically updated without restarting the service\n\n# Custom application properties\napp:\n  name: product-test-service\n  version: 1.0.0\n  \n  # Feature flags\n  features:\n    seckill:\n      enabled: true\n      max-quantity-per-order: 5\n      seckill-duration-minutes: 60\n    cache:\n      enabled: true\n      ttl-seconds: 3600\n      preload-enabled: false\n    rate-limit:\n      enabled: true\n      max-requests-per-second: 100\n      burst-capacity: 200\n\n# Business configuration\nbusiness:\n  order:\n    timeout-seconds: 300\n    max-retry-count: 3\n    payment-url: http://payment-service/api/pay\n  product:\n    default-page-size: 20\n    max-page-size: 100\n    cache-key-prefix: product:\n  inventory:\n    check-before-order: true\n    auto-deduct: true\n\n# Nacos dynamic configuration example\n# These properties can be updated in Nacos console and will be refreshed automatically\ndynamic:\n  config:\n    refresh-interval: 5000\n    enable-notify: true\n  rule:\n    circuit-breaker:\n      enabled: true\n      failure-rate-threshold: 50\n      wait-duration-in-open-state: 60000\n      sliding-window-size: 100\n    rate-limiter:\n      enabled: true\n      replenish-rate: 100\n      burst-capacity: 200\n      timeout-duration: 1000\n",
  "type": "yaml"
}
