spring:
  application:
    name: gateway-service
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:nacos}:${NACOS_SERVER_PORT:8848}
        namespace: ${NACOS_NAMESPACE:}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        enabled: true
        heart-beat-interval: 5000
        heart-beat-timeout: 15000
        ip-delete-timeout: 30000
      config:
        server-addr: ${NACOS_SERVER_ADDR:nacos}:${NACOS_SERVER_PORT:8848}
        namespace: ${NACOS_NAMESPACE:}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        file-extension: yaml
        enabled: true
        refresh-enabled: true
        max-size: 10485760
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
          filters:
            - name: CircuitBreaker
              args:
                id: backend-circuit-breaker
                uri: lb://backend-service
      routes:
        # Product Service Route
        - id: product-service
          uri: lb://product-service
          predicates:
            - Path=/api/products/**
          filters:
            - name: CircuitBreaker
              args:
                id: product-circuit-breaker
                fallbackUri: forward:/fallback/product
            - StripPrefix=1
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 100
                redis-rate-limiter.burstCapacity: 200
                key-resolver: "#{@pathKeyResolver}"
        # Order Service Route
        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/api/orders/**
          filters:
            - name: CircuitBreaker
              args:
                id: order-circuit-breaker
                fallbackUri: forward:/fallback/order
            - StripPrefix=1
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 50
                redis-rate-limiter.burstCapacity: 100
                key-resolver: "#{@pathKeyResolver}"
        # User Service Route
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/users/**
          filters:
            - name: CircuitBreaker
              args:
                id: user-circuit-breaker
                fallbackUri: forward:/fallback/user
            - StripPrefix=1
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 50
                redis-rate-limiter.burstCapacity: 100
                key-resolver: "#{@ipKeyResolver}"
        # Backend Service Route (legacy)
        - id: backend-service
          uri: lb://backend-service
          predicates:
            - Path=/api/backend/**
          filters:
            - StripPrefix=1
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: false
            maxAge: 3600
      default-filters:
        - DedupeResponseHeader=Vary Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_FIRST
    sentinel:
      eager: true
      transport:
        dashboard: ${SENTINEL_SERVER_ADDR:localhost}:${SENTINEL_DASHBOARD_PORT:8858}
        port: 8719
      filter:
        enabled: true
      datasource:
        ds:
          nacos:
            server-addr: ${NACOS_SERVER_ADDR:nacos}:${NACOS_SERVER_PORT:8848}
            dataId: ${NACOS_DATA_ID:gateway-sentinel-rules}
            groupId: ${NACOS_GROUP:DEFAULT_GROUP}
            data-type: json
            rule-type: flow

  redis:
    host: ${REDIS_HOST:redis}
    port: ${REDIS_PORT:6379}
    database: 0
    timeout: 3000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
        max-wait: -1ms

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  level:
    root: INFO
    org.springframework.cloud.gateway: DEBUG
    com.alibaba.nacos: DEBUG
