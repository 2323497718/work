version: "3.9"

services:
  mysql-write:
    image: mysql:8.0
    container_name: seckill-mysql-write
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: seckill_demo
    ports:
      - "3306:3306"
    volumes:
      - mysql_write_data:/var/lib/mysql
      - ./src/main/resources/sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p123456"]
      interval: 10s
      timeout: 5s
      retries: 10

  mysql-read:
    image: mysql:8.0
    container_name: seckill-mysql-read
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: seckill_demo
    ports:
      - "3307:3306"
    volumes:
      - mysql_read_data:/var/lib/mysql
      - ./src/main/resources/sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p123456"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: seckill-redis
    ports:
      - "6379:6379"

  kafka:
    image: bitnami/kafka:3.7
    container_name: seckill-kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_CFG_NODE_ID=0
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_KRAFT_CLUSTER_ID=abcdefghijklmnopqrstuv
      - ALLOW_PLAINTEXT_LISTENER=yes

  backend-1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: seckill-backend-1
    environment:
      SERVER_PORT: 8081
      INSTANCE_ID: backend-1
      DB_WRITE_URL: jdbc:mysql://mysql-write:3306/seckill_demo?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      DB_WRITE_USERNAME: root
      DB_WRITE_PASSWORD: 123456
      DB_READ_URL: jdbc:mysql://mysql-read:3306/seckill_demo?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      DB_READ_USERNAME: root
      DB_READ_PASSWORD: 123456
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      mysql-write:
        condition: service_healthy
      mysql-read:
        condition: service_healthy
      redis:
        condition: service_started
      kafka:
        condition: service_started
    ports:
      - "8081:8081"

  backend-2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: seckill-backend-2
    environment:
      SERVER_PORT: 8082
      INSTANCE_ID: backend-2
      DB_WRITE_URL: jdbc:mysql://mysql-write:3306/seckill_demo?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      DB_WRITE_USERNAME: root
      DB_WRITE_PASSWORD: 123456
      DB_READ_URL: jdbc:mysql://mysql-read:3306/seckill_demo?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      DB_READ_USERNAME: root
      DB_READ_PASSWORD: 123456
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      mysql-write:
        condition: service_healthy
      mysql-read:
        condition: service_healthy
      redis:
        condition: service_started
      kafka:
        condition: service_started
    ports:
      - "8082:8082"

  nginx:
    image: nginx:1.27-alpine
    container_name: seckill-nginx
    depends_on:
      - backend-1
      - backend-2
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/html:/usr/share/nginx/html:ro

  elasticsearch:
    image: elasticsearch:8.13.4
    container_name: seckill-es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    profiles:
      - es

volumes:
  mysql_write_data:
  mysql_read_data:
