spring.application.name=Product_Test
server.port=${SERVER_PORT:8081}
app.instance-id=${INSTANCE_ID:instance-${server.port}}

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/seckill_demo?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:123456}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.timeout=2s

mybatis.configuration.map-underscore-to-camel-case=true
