spring:
  application:
    name: product-test-service
  
  # 数据库配置 - 从环境变量读取
  datasource:
    write:
      url: ${DB_WRITE_URL:jdbc:mysql://localhost:3306/seckill_demo?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
      username: ${DB_WRITE_USERNAME:root}
      password: ${DB_WRITE_PASSWORD:123456}
      driver-class-name: com.mysql.cj.jdbc.Driver
      hikari:
        maximum-pool-size: 20
        minimum-idle: 5
        connection-timeout: 30000
        idle-timeout: 600000
        max-lifetime: 1800000
    read:
      url: ${DB_READ_URL:jdbc:mysql://localhost:3307/seckill_demo?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
      username: ${DB_READ_USERNAME:root}
      password: ${DB_READ_PASSWORD:123456}
      driver-class-name: com.mysql.cj.jdbc.Driver
      hikari:
        maximum-pool-size: 20
        minimum-idle: 5
        connection-timeout: 30000
        idle-timeout: 600000
        max-lifetime: 1800000

  # Redis 配置
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

  # Kafka 配置
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      retries: 3
      acks: all
      batch-size: 16384
      buffer-memory: 33554432
    consumer:
      group-id: product-test-group
      auto-offset-reset: earliest
      enable-auto-commit: false
      max-poll-records: 500
    listener:
      concurrency: 3
      ack-mode: manual

# MyBatis 配置
mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.example.product_test.*.model
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: true
    lazy-loading-enabled: true
    aggressive-lazy-loading: false
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

# 服务端口
server:
  port: ${SERVER_PORT:8081}

# Actuator 配置
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
    refresh:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

# 日志配置
logging:
  level:
    root: INFO
    com.example.product_test: DEBUG
    com.alibaba.nacos: DEBUG
    org.springframework.cloud.alibaba: DEBUG
