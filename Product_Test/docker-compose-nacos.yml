version: "3.9"

services:
  # MySQL 主从配置（已有）
  mysql-write:
    image: mysql:8.0
    container_name: seckill-mysql-write
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: seckill_demo
    ports:
      - "3306:3306"
    volumes:
      - mysql_write_data:/var/lib/mysql
      - ./src/main/resources/sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p123456"]
      interval: 10s
      timeout: 5s
      retries: 10

  mysql-read:
    image: mysql:8.0
    container_name: seckill-mysql-read
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: seckill_demo
    ports:
      - "3307:3306"
    volumes:
      - mysql_read_data:/var/lib/mysql
      - ./src/main/resources/sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p123456"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: seckill-redis
    ports:
      - "6379:6379"

  kafka:
    image: bitnami/kafka:3.7
    container_name: seckill-kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_CFG_NODE_ID=0
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_KRAFT_CLUSTER_ID=abcdefghijklmnopqrstuv
      - ALLOW_PLAINTEXT_LISTENER=yes

  # Nacos 服务注册与配置中心（单机模式）
  nacos:
    image: nacos/nacos-server:v2.4.3
    container_name: seckill-nacos
    environment:
      - MODE=standalone
      - SPRING_DATASOURCE_PLATFORM=embedded
      - JVM_XMS=512m
      - JVM_XMX=512m
      - JVM_XMN=256m
    ports:
      - "8848:8848"   # Nacos 控制台
      - "9848:9848"   # gRPC 端口
    volumes:
      - nacos_data:/home/nacos/data
      - nacos_logs:/home/nacos/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/v1/console/health/readiness"]
      interval: 15s
      timeout: 10s
      retries: 5

  # Sentinel 流量控制台
  sentinel:
    image: bladex/sentinel-dashboard:1.9.0
    container_name: seckill-sentinel
    environment:
      - JAVA_OPTS=-Dserver.port=8858 -Dcsp.sentinel.dashboard.server=localhost:8858 -Dproject.name=sentinel-dashboard
    ports:
      - "8858:8858"

  backend-1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: seckill-backend-1
    environment:
      SERVER_PORT: 8081
      INSTANCE_ID: backend-1
      # Nacos 配置
      NACOS_SERVER_ADDR: nacos
      NACOS_SERVER_PORT: 8848
      NACOS_NAMESPACE: ${NACOS_NAMESPACE:-}
      NACOS_GROUP: ${NACOS_GROUP:-DEFAULT_GROUP}
      NACOS_DATA_ID: ${APP_NAME:product-test}-backend
      # 数据库配置
      DB_WRITE_URL: jdbc:mysql://mysql-write:3306/seckill_demo?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      DB_WRITE_USERNAME: root
      DB_WRITE_PASSWORD: 123456
      DB_READ_URL: jdbc:mysql://mysql-read:3306/seckill_demo?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      DB_READ_USERNAME: root
      DB_READ_PASSWORD: 123456
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # Kafka
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      # Sentinel
      SENTINEL_SERVER_ADDR: sentinel:8858
    depends_on:
      mysql-write:
        condition: service_healthy
      mysql-read:
        condition: service_healthy
      redis:
        condition: service_started
      kafka:
        condition: service_started
      nacos:
        condition: service_healthy
    ports:
      - "8081:8081"

  backend-2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: seckill-backend-2
    environment:
      SERVER_PORT: 8082
      INSTANCE_ID: backend-2
      # Nacos 配置
      NACOS_SERVER_ADDR: nacos
      NACOS_SERVER_PORT: 8848
      NACOS_NAMESPACE: ${NACOS_NAMESPACE:-}
      NACOS_GROUP: ${NACOS_GROUP:-DEFAULT_GROUP}
      NACOS_DATA_ID: ${APP_NAME:product-test}-backend
      # 数据库配置
      DB_WRITE_URL: jdbc:mysql://mysql-write:3306/seckill_demo?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      DB_WRITE_USERNAME: root
      DB_WRITE_PASSWORD: 123456
      DB_READ_URL: jdbc:mysql://mysql-read:3306/seckill_demo?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      DB_READ_USERNAME: root
      DB_READ_PASSWORD: 123456
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # Kafka
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      # Sentinel
      SENTINEL_SERVER_ADDR: sentinel:8858
    depends_on:
      mysql-write:
        condition: service_healthy
      mysql-read:
        condition: service_healthy
      redis:
        condition: service_started
      kafka:
        condition: service_started
      nacos:
        condition: service_healthy
    ports:
      - "8082:8082"

  # API Gateway 服务
  gateway:
    image: openjdk:25-jdk-alpine
    container_name: seckill-gateway
    working_dir: /app
    command: ["sh", "-c", "sleep 30 && java -jar gateway.jar"]
    volumes:
      - ./gateway:/app
    environment:
      - SERVER_PORT=8080
      # Nacos 配置
      NACOS_SERVER_ADDR: nacos
      NACOS_SERVER_PORT: 8848
      NACOS_NAMESPACE: ${NACOS_NAMESPACE:-}
      NACOS_GROUP: ${NACOS_GROUP:-DEFAULT_GROUP}
      NACOS_DATA_ID: ${APP_NAME:product-test}-gateway
      # Sentinel
      SENTINEL_SERVER_ADDR: sentinel:8858
    depends_on:
      nacos:
        condition: service_healthy
      backend-1:
        condition: service_started
      backend-2:
        condition: service_started
    ports:
      - "8080:8080"

  nginx:
    image: nginx:1.27-alpine
    container_name: seckill-nginx
    depends_on:
      - backend-1
      - backend-2
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/html:/usr/share/nginx/html:ro

  elasticsearch:
    image: elasticsearch:8.13.4
    container_name: seckill-es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    profiles:
      - es

volumes:
  mysql_write_data:
  mysql_read_data:
  nacos_data:
  nacos_logs:
